<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Comunidad Mango · OS</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=Raleway:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
:root{--dark:#323231;--cream:#f5f3ef;--gray-mid:#737373;--gray-light:#c6c5c5;--gray-bg:#fafaf8;--accent:#e8a020;--accent-light:#f5d08a;--success:#2e7d32;--success-bg:#e8f5e9;--info:#1565c0;--info-bg:#e3f2fd;--warn:#e65100;--warn-bg:#fff3e0;--danger:#c62828;--danger-bg:#ffebee;--sw:260px;--sw-c:72px;--tr:0.3s cubic-bezier(0.4,0,0.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--cream);color:var(--dark);font-family:'Raleway',sans-serif;min-height:100vh;overflow-x:hidden}
#app{display:flex;min-height:100vh}
#main{flex:1;margin-left:var(--sw);transition:margin-left var(--tr);min-height:100vh;background:var(--gray-bg)}
#app.closed #main{margin-left:var(--sw-c)}
#sidebar{position:fixed;left:0;top:0;height:100vh;width:var(--sw);background:var(--dark);display:flex;flex-direction:column;z-index:100;transition:width var(--tr);overflow:hidden}
#sidebar.closed{width:var(--sw-c)}
.sb-head{padding:24px 20px 20px;border-bottom:1px solid rgba(245,243,239,.1);display:flex;align-items:center;gap:12px;min-height:80px}
.sb-logo-txt{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;color:#f5f3ef;letter-spacing:.05em;white-space:nowrap}
#sidebar.closed .sb-logo-txt{display:none}
.sb-toggle{margin-left:auto;background:none;border:none;color:var(--gray-light);cursor:pointer;padding:6px 10px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all var(--tr);flex-shrink:0;font-size:18px;line-height:1}
.sb-toggle:hover{background:rgba(245,243,239,.08);color:var(--cream)}
.sb-nav{flex:1;padding:14px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;overflow-x:hidden}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(245,243,239,.1);border-radius:2px}
.nav-sec{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gray-mid);padding:14px 8px 6px;white-space:nowrap;transition:opacity var(--tr)}
#sidebar.closed .nav-sec{opacity:0}
.nav-btn{display:flex;align-items:center;gap:12px;padding:9px 12px;border-radius:8px;cursor:pointer;transition:all var(--tr);color:var(--gray-light);font-family:'Raleway',sans-serif;font-size:13px;font-weight:500;white-space:nowrap;border:none;background:none;width:100%;text-align:left}
.nav-btn:hover{background:rgba(245,243,239,.07);color:var(--cream)}
.nav-btn.active{background:rgba(232,160,32,.15);color:var(--accent-light);border-left:2px solid var(--accent)}
.nav-icon{font-size:16px;flex-shrink:0;width:18px;text-align:center}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:5px}
.nav-lbl{transition:opacity var(--tr);overflow:hidden;text-overflow:ellipsis}
#sidebar.closed .nav-lbl{opacity:0;pointer-events:none}
.sb-foot{padding:14px 12px;border-top:1px solid rgba(245,243,239,.1)}
.sb-badge{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(232,160,32,.1);border-radius:8px}
.badge-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.badge-txt{font-family:'Poppins',sans-serif;font-size:11px;color:var(--accent-light);white-space:nowrap;transition:opacity var(--tr)}
#sidebar.closed .badge-txt{opacity:0}
.page{padding:42px 48px;max-width:1280px;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-eye{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.page-title{font-family:'Oswald',sans-serif;font-size:38px;font-weight:600;color:var(--dark);line-height:1.1;margin-bottom:8px}
.page-sub{font-family:'Raleway',sans-serif;font-size:15px;color:var(--gray-mid);max-width:640px;line-height:1.6;margin-bottom:36px}
.card{background:#fff;border-radius:12px;padding:24px;border:1px solid rgba(50,50,49,.08);transition:all var(--tr)}
.card-dark{background:var(--dark);color:var(--cream)}
.card-flat{background:rgba(50,50,49,.03);border:none}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.gauto{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-family:'Poppins',sans-serif;font-size:11px;font-weight:500}
.t-fijo{background:rgba(50,50,49,.08);color:var(--dark)}
.t-freelance{background:rgba(232,160,32,.15);color:#9a6400}
.t-junior{background:rgba(115,115,115,.12);color:var(--gray-mid)}
.t-senior{background:rgba(50,50,49,.12);color:var(--dark)}
.t-activo{background:var(--success-bg);color:var(--success)}
.t-pausado{background:var(--warn-bg);color:var(--warn)}
.t-onboarding{background:var(--info-bg);color:var(--info)}
.t-ecommerce{background:rgba(156,39,176,.12);color:#7b1fa2}
.t-leadgen{background:rgba(0,121,107,.12);color:#00695c}
.t-mango{background:rgba(232,160,32,.15);color:#9a6400}
.t-cliente{background:rgba(50,50,49,.1);color:var(--dark)}
.divider{height:1px;background:rgba(50,50,49,.08);margin:24px 0}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;font-family:'Raleway',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all var(--tr);border:none}
.btn-dark{background:var(--dark);color:var(--cream)}
.btn-dark:hover{background:#000}
.btn-ghost{background:transparent;color:var(--dark);border:1.5px solid rgba(50,50,49,.2)}
.btn-ghost:hover{border-color:var(--dark)}
.btn-danger{background:transparent;color:var(--danger);border:1.5px solid rgba(198,40,40,.3)}
.btn-danger:hover{background:var(--danger-bg);border-color:var(--danger)}
.btn-sm{padding:6px 12px;font-size:12px}
.wf-step{display:flex;gap:18px;position:relative;padding-bottom:28px}
.wf-step:last-child{padding-bottom:0}
.wf-step:not(:last-child)::after{content:'';position:absolute;left:19px;top:40px;bottom:0;width:2px;background:rgba(50,50,49,.1)}
.step-num{width:40px;height:40px;border-radius:50%;background:var(--dark);color:var(--cream);display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;flex-shrink:0}
.step-body{flex:1;padding-top:6px}
.step-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:500;color:var(--dark);margin-bottom:5px}
.step-desc{font-family:'Raleway',sans-serif;font-size:13.5px;color:var(--gray-mid);line-height:1.6;margin-bottom:8px}
.step-meta{display:flex;gap:6px;flex-wrap:wrap}
.step-tag{font-family:'Poppins',sans-serif;font-size:11.5px;padding:3px 9px;border-radius:20px;background:rgba(50,50,49,.06);color:var(--dark)}
.step-tag.time,.step-tag.out{color:var(--gray-mid)}
.cl-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid rgba(50,50,49,.06);cursor:pointer;user-select:none}
.cl-item:last-child{border:none}
.cl-box{width:20px;height:20px;border:2px solid var(--gray-light);border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--tr);margin-top:1px;font-size:12px}
.cl-item.done .cl-box{background:var(--dark);border-color:var(--dark);color:#fff}
.cl-item.done .cl-text{text-decoration:line-through;color:var(--gray-mid)}
.cl-text{font-family:'Raleway',sans-serif;font-size:13.5px;color:var(--dark);line-height:1.5;flex:1}
.cl-cat{padding:2px 8px;border-radius:12px;font-size:10px;font-family:'Poppins',sans-serif;background:#f0f0f0;color:var(--dark);flex-shrink:0}
.prog-wrap{height:6px;background:rgba(50,50,49,.08);border-radius:3px;overflow:hidden;margin-bottom:18px}
.prog-bar{height:100%;border-radius:3px;transition:width .4s ease}
.org-node{background:#fff;border-radius:12px;padding:18px;border:1px solid rgba(50,50,49,.1);transition:all var(--tr)}
.org-node:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(232,160,32,.12)}
.org-node.founder{background:var(--dark);color:var(--cream)}
.org-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;margin-bottom:10px}
.org-name{font-family:'Oswald',sans-serif;font-size:17px;font-weight:500;margin-bottom:3px}
.org-role{font-family:'Poppins',sans-serif;font-size:11px;margin-bottom:10px;opacity:.7}
.org-li{list-style:none;display:flex;flex-direction:column;gap:4px}
.org-li li{font-family:'Raleway',sans-serif;font-size:13px;color:var(--gray-mid);display:flex;gap:7px;line-height:1.4}
.org-node.founder .org-li li{color:var(--gray-light)}
.org-li li::before{content:'→';font-size:11px;margin-top:2px;flex-shrink:0;color:var(--accent)}
.role-pill{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:30px;border:2px solid rgba(50,50,49,.12);background:#fff;cursor:pointer;transition:all .2s;font-family:'Raleway',sans-serif;font-size:13px;font-weight:600;color:var(--gray-mid)}
.role-pill.active{border-color:var(--dark);background:rgba(50,50,49,.06);color:var(--dark)}
.av-sm{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:11px;font-weight:700}
.tabs{display:flex;gap:4px;background:rgba(50,50,49,.05);border-radius:8px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:8px 0;border-radius:6px;border:none;font-family:'Poppins',sans-serif;font-size:12px;cursor:pointer;transition:all .2s;background:transparent;color:var(--gray-mid)}
.tab.active{background:#fff;font-weight:600;color:var(--dark);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.subtabs{display:flex;gap:6px;border-bottom:2px solid rgba(50,50,49,.08);margin-bottom:24px}
.subtab{padding:10px 18px;border:none;background:none;font-family:'Raleway',sans-serif;font-size:13px;cursor:pointer;color:var(--gray-mid);font-weight:500;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.subtab:hover{color:var(--dark)}
.subtab.active{color:var(--dark);border-bottom-color:var(--accent);font-weight:600}
.acc-row{background:#fff;border-radius:12px;padding:16px 22px;border:1px solid rgba(50,50,49,.08);display:flex;align-items:center;gap:18px;cursor:pointer;transition:all .2s;margin-bottom:8px}
.acc-row:hover{border-color:var(--dark);transform:translateX(2px)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:#fff;border-radius:16px;padding:32px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto}
.modal h2{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;margin-bottom:20px}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.f-group{margin-bottom:14px}
.f-group label{font-family:'Poppins',sans-serif;font-size:11px;color:var(--gray-mid);display:block;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.f-group input,.f-group select,.f-group textarea{width:100%;padding:10px 12px;border:1.5px solid rgba(50,50,49,.15);border-radius:8px;font-family:'Raleway',sans-serif;font-size:14px;color:var(--dark);background:#fff;outline:none;transition:border-color .2s}
.f-group input:focus,.f-group select:focus,.f-group textarea:focus{border-color:var(--dark)}
.f-group textarea{resize:vertical;min-height:60px}
.kpi-card{background:#fff;border-radius:12px;padding:18px 20px;border:1px solid rgba(50,50,49,.08)}
.kpi-lbl{font-family:'Poppins',sans-serif;font-size:11px;color:var(--gray-mid);letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.kpi-val{font-family:'Oswald',sans-serif;font-size:28px;font-weight:600;color:var(--dark);line-height:1;margin-bottom:6px}
.kpi-trend{font-family:'Poppins',sans-serif;font-size:11px;display:flex;align-items:center;gap:4px}
.kpi-trend.up{color:var(--success)}
.kpi-trend.down{color:var(--danger)}
.kpi-trend.flat{color:var(--gray-mid)}
.alert{padding:12px 16px;border-radius:10px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;border-left:3px solid}
.alert.warn{background:var(--warn-bg);border-left-color:var(--warn);color:#5d2c00}
.alert.danger{background:var(--danger-bg);border-left-color:var(--danger);color:#5e1010}
.alert.info{background:var(--info-bg);border-left-color:var(--info);color:#0a3a6e}
.alert-icon{font-size:16px;flex-shrink:0;line-height:1.4}
.alert-txt{font-size:13px;line-height:1.5;flex:1}
.alert-meta{font-family:'Poppins',sans-serif;font-size:10px;opacity:.7;margin-top:3px}
.note-item{padding:14px 16px;background:rgba(50,50,49,.03);border-radius:10px;margin-bottom:10px}
.note-meta{font-family:'Poppins',sans-serif;font-size:10px;color:var(--gray-mid);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.note-text{font-size:13.5px;color:var(--dark);line-height:1.5}
.doc-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(232,160,32,.05);border-radius:10px;margin-bottom:8px;border-left:3px solid var(--accent)}
.doc-icon{font-size:18px}
.doc-name{flex:1;min-width:0}
.doc-title{font-size:13px;font-weight:500;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-family:'Poppins',sans-serif;font-size:10px;color:var(--gray-mid);margin-top:2px}
.doc-link{font-family:'Poppins',sans-serif;font-size:11px;color:var(--accent);text-decoration:none}
.creative-card{background:#fff;border-radius:10px;padding:14px;border:1px solid rgba(50,50,49,.08)}
.creative-thumb{width:100%;aspect-ratio:1.2;background:linear-gradient(135deg,#f5f3ef 0%,#e8e6e1 100%);border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-family:'Oswald',sans-serif;color:var(--gray-mid);font-size:11px}
.creative-title{font-size:13px;font-weight:600;margin-bottom:6px}
.creative-stats{display:flex;gap:10px;font-family:'Poppins',sans-serif;font-size:11px;color:var(--gray-mid)}
.empty-state{text-align:center;padding:48px 24px;color:var(--gray-mid)}
.empty-state-icon{font-size:36px;opacity:.4;margin-bottom:12px}
.empty-state-txt{font-size:14px;line-height:1.6}
.section-lbl{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--gray-mid);margin-bottom:14px;font-weight:600}
.kv-table{width:100%;font-size:13px}
.kv-table tr{border-bottom:1px solid rgba(50,50,49,.06)}
.kv-table tr:last-child{border:none}
.kv-table td{padding:9px 0}
.kv-table td:first-child{color:var(--gray-mid)}
.kv-table td:last-child{text-align:right;color:var(--dark);font-weight:500}
.editable{padding:2px 6px;border-radius:4px;border:1px dashed transparent;cursor:text;transition:border-color .2s}
.editable:hover{border-color:rgba(50,50,49,.2)}
.editable:focus{outline:none;border-color:var(--accent);background:rgba(232,160,32,.05)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:var(--gray-light);border-radius:3px}
@media(max-width:1024px){.g3,.g4{grid-template-columns:1fr 1fr}.page{padding:30px 28px}}
@media(max-width:768px){.g2,.g3,.g4,.f-row{grid-template-columns:1fr}.page{padding:24px 20px}.page-title{font-size:28px}#main{margin-left:var(--sw-c)!important}}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen" style="position:fixed;inset:0;background:#f5f3ef;display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="text-align:center">
    <div style="font-family:'Oswald',sans-serif;font-size:32px;font-weight:700;color:#323231;letter-spacing:.05em;margin-bottom:14px">MANGO</div>
    <div style="width:32px;height:32px;border:3px solid rgba(50,50,49,.12);border-top-color:#323231;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto"></div>
    <div id="loadingMsg" style="margin-top:18px;font-family:'Poppins',sans-serif;font-size:12px;color:#737373">Cargando...</div>
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- LOGIN SCREEN -->
<div id="loginScreen" style="display:none;position:fixed;inset:0;background:#f5f3ef;align-items:center;justify-content:center;z-index:9998;padding:20px">
  <div style="max-width:400px;width:100%;text-align:center">
    <div style="font-family:'Oswald',sans-serif;font-size:48px;font-weight:700;color:#323231;letter-spacing:.06em;margin-bottom:6px">MANGO</div>
    <div style="font-family:'Poppins',sans-serif;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#737373;margin-bottom:48px">Agency OS</div>

    <div style="background:#fff;border:1px solid rgba(50,50,49,.08);border-radius:14px;padding:36px 28px">
      <div style="font-family:'DM Serif Display',serif;font-style:italic;font-size:18px;color:#323231;line-height:1.45;margin-bottom:30px">"Los negocios que ya funcionan merecen crecer con orden, no con suerte."</div>
      <button id="googleLoginBtn" style="display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px;border:1.5px solid rgba(50,50,49,.15);border-radius:10px;background:#fff;font-family:'Raleway',sans-serif;font-size:14px;font-weight:600;color:#323231;cursor:pointer;transition:all .2s">
        <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
        <span>Iniciar sesión con Google</span>
      </button>
      <div style="font-family:'Poppins',sans-serif;font-size:11px;color:#737373;margin-top:18px;line-height:1.5">Solo cuentas <strong>@comunidadmango.com</strong></div>
      <div id="loginError" style="display:none;margin-top:14px;padding:10px 14px;background:#ffebee;border:1px solid #c62828;border-radius:8px;font-size:12px;color:#c62828;text-align:left;line-height:1.5"></div>
    </div>
    <div style="font-family:'Poppins',sans-serif;font-size:10px;color:#c6c5c5;margin-top:24px">comunidadmango.com · OS v2.0</div>
  </div>
</div>

<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sb-head">
      <span class="sb-logo-txt">MANGO</span>
      <button class="sb-toggle" id="sbToggle">&#8592;</button>
    </div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot">
      <div id="sbUser"></div>
    </div>
  </aside>
  <main id="main"><div id="content"></div></main>
</div>
<script>

function fmt(n,d){if(n===null||n===undefined||isNaN(n))return '—';d=d||0;return Number(n).toLocaleString('es-AR',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtUSD(n){if(n===null||n===undefined||isNaN(n)||n===0)return '—';return 'USD '+fmt(n,0);}
function fmtPct(n,d){if(n===null||n===undefined||isNaN(n)||n===0)return '—';return fmt(n,d||2)+'%';}
function fmtX(n,d){if(n===null||n===undefined||isNaN(n)||n===0)return '—';return fmt(n,d||2)+'×';}
function trend(curr,prev,inverso){
  if(!prev||prev===0||curr===0)return {dir:'flat',pct:0,sym:'—'};
  var pct=((curr-prev)/prev)*100;
  var dir;
  if(Math.abs(pct)<2) dir='flat';
  else if(inverso) dir=pct>0?'down':'up';
  else dir=pct>0?'up':'down';
  return {dir:dir,pct:Math.abs(pct),sym:dir==='up'?'↑':dir==='down'?'↓':'→'};
}
function findCliente(id){return CLIENTES.filter(function(c){return c.id===id;})[0];}

// ── KPIs aggregator ─────────────────────────────────────────────────────────
// Suma KPIs de un período (array de filas de kpis_diarios) y recalcula las
// métricas derivadas. Devuelve null si no hay filas con spend > 0.
function aggregateKpis(rows){
  if(!rows || !rows.length) return null;
  var spend=0, impressions=0, reach=0, clicks=0;
  var conversions=0, purchases=0, leads=0;
  var roasWeighted=0, freqSum=0, freqCount=0;
  rows.forEach(function(r){
    var s = parseFloat(r.spend) || 0;
    spend += s;
    impressions += parseInt(r.impressions) || 0;
    reach = Math.max(reach, parseInt(r.reach) || 0); // reach máx del período
    clicks += parseInt(r.clicks) || 0;
    conversions += parseInt(r.conversions) || 0;
    purchases += parseInt(r.purchases) || 0;
    leads += parseInt(r.leads) || 0;
    if(r.roas > 0) roasWeighted += (parseFloat(r.roas) * s);
    var f = parseFloat(r.frequency) || 0;
    if(f > 0){ freqSum += f; freqCount++; }
  });
  if(spend === 0 && impressions === 0) return null;
  return {
    spend: spend,
    impressions: impressions,
    reach: reach,
    clicks: clicks,
    ctr: impressions ? (clicks / impressions) * 100 : 0,
    cpm: impressions ? (spend / impressions) * 1000 : 0,
    cpc: clicks ? spend / clicks : 0,
    frequency: freqCount ? freqSum / freqCount : 0,
    conversions: conversions,
    purchases: purchases,
    leads: leads,
    cpa: conversions ? spend / conversions : 0,
    cpl: leads ? spend / leads : 0,
    roas: spend ? roasWeighted / spend : 0,
  };
}

// ── Date helpers ────────────────────────────────────────────────────────────
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function parseISO(s){if(!s)return null;var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
function daysUntil(iso){if(!iso)return null;var t=parseISO(todayISO());var d=parseISO(iso);return Math.round((d-t)/(1000*60*60*24));}
function fmtDate(iso){
  if(!iso) return '—';
  var d=daysUntil(iso);
  if(d===0) return 'Hoy';
  if(d===1) return 'Mañana';
  if(d===-1) return 'Ayer';
  if(d>1 && d<=7) return 'En '+d+' días';
  if(d<-1 && d>=-7) return 'Hace '+Math.abs(d)+' días';
  var x=parseISO(iso);
  return String(x.getDate()).padStart(2,'0')+'/'+String(x.getMonth()+1).padStart(2,'0');
}
function isOverdue(t){return t.estado!=='hecho' && t.deadline && daysUntil(t.deadline)<0;}
function isToday(t){return t.deadline && daysUntil(t.deadline)===0;}
function isThisWeek(t){if(!t.deadline)return false;var d=daysUntil(t.deadline);return d>=0 && d<=7;}

// ── Task filtering ──────────────────────────────────────────────────────────
function tasksOf(user){return TASKS.filter(function(t){return t.dueño===user;});}
function tasksOfClient(cid){return TASKS.filter(function(t){return t.clienteId===cid;});}
function sortByDeadline(arr){return arr.slice().sort(function(a,b){
  if(!a.deadline && !b.deadline) return 0;
  if(!a.deadline) return 1;
  if(!b.deadline) return -1;
  return a.deadline.localeCompare(b.deadline);
});}

// MI DÍA — vista personal del integrante actual
// ═══════════════════════════════════════════════════════════════════════════
function pgMiDia(){
  var u=S.currentUser;
  var mias=tasksOf(u);
  var atrasadas=sortByDeadline(mias.filter(isOverdue));
  var hoy=sortByDeadline(mias.filter(function(t){return isToday(t) && t.estado!=='hecho';}));
  var semana=sortByDeadline(mias.filter(function(t){var d=daysUntil(t.deadline);return d>0 && d<=7 && t.estado!=='hecho';}));
  var sinFecha=mias.filter(function(t){return !t.deadline && t.estado!=='hecho';});
  var hechas=mias.filter(function(t){return t.estado==='hecho';}).length;

  return '<div class="page">'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:8px">'
    +userAvatar(u,42)
    +'<div><div class="page-eye">Mi día · '+u+'</div></div>'
    +'</div>'
    +'<h1 class="page-title" style="margin-bottom:6px">Lo que tengo hoy</h1>'
    +'<p class="page-sub">'+(atrasadas.length>0?'<strong style="color:#c62828">'+atrasadas.length+' atrasadas</strong> · ':'')+hoy.length+' hoy · '+semana.length+' esta semana · '+hechas+' hechas</p>'
    +'<div style="display:flex;justify-content:flex-end;margin-bottom:18px"><button class="btn btn-dark" onclick="openModal(\'nueva_tarea\')">+ Nueva tarea</button></div>'
    +taskSection('Atrasadas',atrasadas,'danger')
    +taskSection('Hoy',hoy,'warn')
    +taskSection('Esta semana',semana,'info')
    +taskSection('Sin fecha',sinFecha,'flat')
    +(mias.length===0?'<div class="empty-state"><div class="empty-state-icon">&#9728;</div><div class="empty-state-txt">No tenés tareas asignadas todavía.<br>Tocá <strong>+ Nueva tarea</strong> para crear una.</div></div>':'')
    +'</div>';
}

function taskSection(title,arr,tone){
  if(arr.length===0) return '';
  var color=tone==='danger'?'#c62828':tone==='warn'?'#e65100':tone==='info'?'#1565c0':'#737373';
  return '<div style="margin-bottom:24px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
    +'<div class="section-lbl" style="margin-bottom:0;color:'+color+'">'+title+'</div>'
    +'<div style="font-family:\'Poppins\',sans-serif;font-size:11px;color:var(--gray-mid)">'+arr.length+'</div>'
    +'</div>'
    +arr.map(taskRow).join('')
    +'</div>';
}

function taskRow(t){
  var c=t.clienteId?findCliente(t.clienteId):null;
  var overdue=isOverdue(t);
  var doneBtn=t.estado==='hecho';
  var fechaColor=overdue?'#c62828':isToday(t)?'#e65100':'var(--gray-mid)';
  return '<div style="background:#fff;border:1px solid rgba(50,50,49,.08);border-left:3px solid '+(overdue?'#c62828':isToday(t)?'#e65100':doneBtn?'#2e7d32':c?c.color:'#c6c5c5')+';border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;'+(doneBtn?'opacity:.65;':'')+'">'
    +'<div onclick="toggleTaskDone(\''+t.id+'\')" style="width:22px;height:22px;border:2px solid '+(doneBtn?'#2e7d32':'#c6c5c5')+';border-radius:6px;background:'+(doneBtn?'#2e7d32':'#fff')+';color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:12px">'+(doneBtn?'&#10003;':'')+'</div>'
    +'<div style="flex:1;min-width:0;cursor:pointer" onclick="openModal(\'editar_tarea\',\''+t.id+'\')">'
    +'<div style="font-size:14px;font-weight:600;color:var(--dark);margin-bottom:3px;'+(doneBtn?'text-decoration:line-through;color:var(--gray-mid)':'')+'">'+t.titulo+'</div>'
    +'<div style="display:flex;gap:10px;align-items:center;font-family:\'Poppins\',sans-serif;font-size:11px;color:var(--gray-mid);flex-wrap:wrap">'
    +(c?'<span style="display:inline-flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:'+c.color+'"></span>'+c.nombre+'</span>':'<span>Mango interno</span>')
    +(t.deadline?'<span style="color:'+fechaColor+';font-weight:600">'+fmtDate(t.deadline)+'</span>':'<span>sin fecha</span>')
    +(t.prioridad==='alta'?'<span style="color:#c62828;font-weight:600">! alta</span>':'')
    +'</div>'
    +(t.descripcion?'<div style="font-size:12px;color:var(--gray-mid);margin-top:5px;line-height:1.45">'+t.descripcion+'</div>':'')
    +'</div>'
    +userAvatar(t.dueño,28)
    +'</div>';
}

// TODAS LAS TAREAS — vista global con filtros
// ═══════════════════════════════════════════════════════════════════════════
function pgTareas(){
  var f=S.taskFilter;
  var lista=TASKS.slice();
  if(f==='mias') lista=lista.filter(function(t){return t.dueño===S.currentUser;});
  else if(f==='atrasadas') lista=lista.filter(isOverdue);
  else if(f==='hoy') lista=lista.filter(function(t){return isToday(t) && t.estado!=='hecho';});
  else if(f==='semana') lista=lista.filter(function(t){var d=daysUntil(t.deadline);return d!==null && d>=0 && d<=7 && t.estado!=='hecho';});
  else if(f==='hechas') lista=lista.filter(function(t){return t.estado==='hecho';});
  else if(f==='pendientes') lista=lista.filter(function(t){return t.estado!=='hecho';});
  lista=sortByDeadline(lista);

  var totalTodas=TASKS.length;
  var totalMias=tasksOf(S.currentUser).length;
  var totalAtrasadas=TASKS.filter(isOverdue).length;
  var totalHoy=TASKS.filter(function(t){return isToday(t) && t.estado!=='hecho';}).length;

  var filtros=[
    {id:'mias',label:'Mías',count:totalMias},
    {id:'pendientes',label:'Pendientes',count:TASKS.filter(function(t){return t.estado!=='hecho';}).length},
    {id:'atrasadas',label:'Atrasadas',count:totalAtrasadas},
    {id:'hoy',label:'Hoy',count:totalHoy},
    {id:'semana',label:'Esta semana',count:TASKS.filter(function(t){var d=daysUntil(t.deadline);return d!==null && d>=0 && d<=7 && t.estado!=='hecho';}).length},
    {id:'hechas',label:'Hechas',count:TASKS.filter(function(t){return t.estado==='hecho';}).length},
    {id:'todas',label:'Todas',count:totalTodas},
  ];

  return '<div class="page"><div class="page-eye">Operaciones</div><h1 class="page-title">Todas las tareas</h1><p class="page-sub">Vista global del equipo. Filtrá por estado, dueño o cliente. Click en una tarea para editarla.</p>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
    +filtros.map(function(fil){return '<button onclick="S.taskFilter=\''+fil.id+'\';render()" style="padding:6px 14px;border-radius:20px;border:'+(f===fil.id?'2px solid var(--dark)':'2px solid rgba(50,50,49,.12)')+';background:'+(f===fil.id?'var(--dark)':'#fff')+';font-family:\'Poppins\',sans-serif;font-size:12px;color:'+(f===fil.id?'var(--cream)':'var(--gray-mid)')+';cursor:pointer">'+fil.label+' <span style="opacity:.7">'+fil.count+'</span></button>';}).join('')
    +'</div>'
    +'<button class="btn btn-dark" onclick="openModal(\'nueva_tarea\')" style="font-size:13px">+ Nueva tarea</button>'
    +'</div>'
    +(lista.length===0?'<div class="empty-state"><div class="empty-state-icon">&#9776;</div><div class="empty-state-txt">No hay tareas con ese filtro.</div></div>':lista.map(taskRow).join(''))
    +'</div>';
}

    +'</div>'
    +body
    +'</div>';

// ── PERFORMANCE TAB ─────────────────────────────────────────────────────────
function clientePerformance(c){
  var k=c.kpis||{}, p=c.kpisPrev||{};
  var isEcom=c.tipoCuenta==='ecommerce';
  var hasMetaId=c.metaAdAccountId && c.metaAdAccountId.length>0;
  var hasData=k.spend>0 || k.impressions>0;
  var hasRows=c.kpisRows && c.kpisRows.length>0;

  var banner='';
  if(!hasMetaId){
    banner='<div class="alert warn" style="margin-bottom:20px">'
      +'<div class="alert-icon">&#9888;</div>'
      +'<div class="alert-txt"><strong>Falta el Ad Account ID de Meta.</strong> Cargalo desde la pestaña Ficha → Editar para que el cron diario empiece a traer KPIs.</div></div>';
  }else if(!hasData && !hasRows){
    banner='<div class="alert info" style="margin-bottom:20px">'
      +'<div class="alert-icon">&#9432;</div>'
      +'<div class="alert-txt"><strong>Sincronizando con Meta.</strong> Cuenta conectada (<code>'+c.metaAdAccountId+'</code>) pero todavía no llegó data. El cron corre todos los días a las 6am; si recién agregaste la cuenta, puede tardar hasta 24hs en aparecer.</div></div>';
  }else if(!hasData && hasRows){
    banner='<div class="alert info" style="margin-bottom:20px">'
      +'<div class="alert-icon">&#9432;</div>'
      +'<div class="alert-txt"><strong>Sin actividad en los últimos 30 días.</strong> La cuenta está conectada pero no tuvo gasto reciente. Si la campaña está activa y no aparecen métricas, revisá Meta Ads Manager.</div></div>';
  }

  var kpis=[
    {l:'Inversión del mes',v:fmtUSD(k.spend),t:trend(k.spend,p.spend),inv:false},
    isEcom
      ? {l:'ROAS',v:fmtX(k.roas),t:trend(k.roas,p.roas),inv:false}
      : {l:'CPL',v:fmtUSD(k.cpl),t:trend(k.cpl,p.cpl,true),inv:false},
    {l:isEcom?'Compras':'Leads',v:fmt(isEcom?k.purchases:k.leads,0),t:{dir:'flat',sym:'—'},inv:false},
    {l:'CTR',v:fmtPct(k.ctr,2),t:trend(k.ctr,p.ctr),inv:false},
    {l:'CPM',v:fmtUSD(k.cpm),t:trend(k.cpm,0,true),inv:true},
    {l:'Frecuencia',v:fmt(k.frequency,2),t:trend(k.frequency,p.frequency,true),inv:true},
  ];

  var kpiHtml='<div class="g3" style="margin-bottom:20px">'+kpis.map(function(kp){
    var arrow=kp.t.dir==='up'?'↑':kp.t.dir==='down'?'↓':'→';
    var pct=kp.t.pct?' '+fmt(kp.t.pct,1)+'%':'';
    return '<div class="kpi-card">'
      +'<div class="kpi-lbl">'+kp.l+'</div>'
      +'<div class="kpi-val">'+kp.v+'</div>'
      +'<div class="kpi-trend '+kp.t.dir+'">'+arrow+pct+' vs mes ant.</div></div>';
  }).join('')+'</div>';

  // Alertas
  var alertasHtml='';
  if(c.alertas && c.alertas.length){
    alertasHtml='<div class="section-lbl">Alertas</div>'
      +c.alertas.map(function(a){return '<div class="alert '+a.severidad+'">'
        +'<div class="alert-icon">'+(a.severidad==='danger'?'&#9888;':a.severidad==='warn'?'&#9888;':'&#9432;')+'</div>'
        +'<div class="alert-txt">'+a.mensaje+'<div class="alert-meta">'+(a.fecha||'')+'</div></div></div>';}).join('')
      +'<div style="margin-bottom:24px"></div>';
  }else{
    alertasHtml='<div class="section-lbl">Alertas</div>'
      +'<div class="card" style="padding:18px;text-align:center;color:var(--gray-mid);font-size:13px;margin-bottom:24px">Sin alertas. Las alertas automáticas se activan cuando se conecte con Meta API.</div>';
  }

  // Top creativos
  var creativosHtml='<div class="section-lbl">Top creativos del mes</div>';
  if(c.topCreativos && c.topCreativos.length){
    creativosHtml+='<div class="g3" style="margin-bottom:24px">'+c.topCreativos.slice(0,3).map(function(cr){return '<div class="creative-card">'
      +'<div class="creative-thumb">'+(cr.formato||'creative')+'</div>'
      +'<div class="creative-title">'+cr.nombre+'</div>'
      +'<div class="creative-stats"><span>CTR '+fmtPct(cr.ctr,1)+'</span><span>'+(isEcom?'ROAS '+fmtX(cr.roas):'CPL '+fmtUSD(cr.cpl))+'</span></div></div>';}).join('')+'</div>';
  }else{
    creativosHtml+='<div class="card" style="padding:24px;text-align:center;color:var(--gray-mid);font-size:13px;margin-bottom:24px">Sin creativos registrados todavía. Se cargarán automáticamente con la integración de Meta.</div>';
  }

  // Resumen rápido del cliente
  var resumen='<div class="g2" style="margin-bottom:24px">'
    +'<div class="card"><div class="section-lbl" style="margin-bottom:14px">Cuenta</div>'

    +(tCount>0
      ?'<div style="font-family:\'Poppins\',sans-serif;font-size:11px;color:var(--gray-mid);margin-bottom:10px">'+tPend+' pendientes'+(tAtr>0?' · <strong style="color:#c62828">'+tAtr+' atrasadas</strong>':'')+' · '+tCount+' total</div>'+sortByDeadline(taskCliente).map(taskRow).join('')
      :'<div class="card" style="padding:24px;text-align:center;color:var(--gray-mid);font-size:13px">Sin tareas para este cliente. Tocá <strong>+ Nueva tarea</strong> para asignar la primera.</div>')
    +'</div>';

  var checklists='<div class="section-lbl">Checklists del cliente</div>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">'
    +TPLS.map(function(t){return '<button style="padding:6px 12px;border-radius:20px;border:'+(S.clienteTpl===t.id?'2px solid '+t.color:'2px solid rgba(50,50,49,.12)')+';background:'+(S.clienteTpl===t.id?t.color+'12':'#fff')+';font-family:\'Raleway\',sans-serif;font-size:12px;font-weight:600;color:'+(S.clienteTpl===t.id?t.color:'var(--gray-mid)')+';cursor:pointer" onclick="S.clienteTpl=\''+t.id+'\';render()">'+t.icon+' '+t.title+'</button>';}).join('')
    +'</div>'

    +'<div><div style="font-family:\'Oswald\',sans-serif;font-size:17px;font-weight:600">'+tpl.title+'</div>'
    +'<div style="font-family:\'Poppins\',sans-serif;font-size:11px;color:var(--gray-mid)">'+tpl.owner+'</div></div>'
    +'<button onclick="resetCheckClient(\''+c.id+'\',\''+S.clienteTpl+'\')" class="btn btn-ghost btn-sm">Reset</button>'
    +'</div>'

// ═══════════════════════════════════════════════════════════════════════════
// MODALES

function openModal(tipo,id,extraId){S.modal=tipo;S.editandoId=id||null;S.modalExtra=extraId||null;render();}
function closeModal(){S.modal=null;S.editandoId=null;S.modalExtra=null;render();}

function renderModal(){
  if(!S.modal) return '';
  var html='';
  if(S.modal==='nueva_cuenta') html=modalCuenta(null);
  else if(S.modal==='editar_cuenta') html=modalCuenta(findCliente(S.editandoId));
  else if(S.modal==='nueva_nota') html=modalNota(S.editandoId);
  else if(S.modal==='nuevo_doc') html=modalDoc(S.editandoId);
  else if(S.modal==='nueva_tarea') html=modalTarea(null,S.modalExtra);
  else if(S.modal==='editar_tarea') html=modalTarea(findTask(S.editandoId),null);
  else if(S.modal==='nuevo_miembro') html=modalMiembro(null);
  else if(S.modal==='editar_miembro') html=modalMiembro(TEAM.find(function(t){return t.id===S.editandoId;}));
  else if(S.modal==='nuevo_workflow') html=modalWorkflow(null);
  else if(S.modal==='editar_workflow') html=modalWorkflow(WFS.find(function(w){return w.id===S.editandoId;}));
  else if(S.modal==='nuevo_paso') html=modalPaso(null,S.modalExtra);
  else if(S.modal==='editar_paso') html=modalPaso(parseInt(S.editandoId),S.modalExtra);
  else if(S.modal==='nuevo_template') html=modalTemplate(null);
  else if(S.modal==='editar_template') html=modalTemplate(TPLS.find(function(t){return t.id===S.editandoId;}));
  else if(S.modal==='nuevo_item_tpl') html=modalItemTpl(null,S.modalExtra);
  else if(S.modal==='editar_item_tpl') html=modalItemTpl(parseInt(S.editandoId),S.modalExtra);
  else if(S.modal==='editar_mango_identidad') html=modalMangoIdentidad();
  else if(S.modal==='editar_mango_etapa') html=modalMangoEtapa(parseInt(S.editandoId));
  return '<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">'+html+'</div></div>';
}

async function saveTask(id){
  var titulo=document.getElementById('ft_titulo').value.trim();
  if(!titulo){alert('Escribí un título.');return;}
  var data={
    titulo:titulo,
    descripcion:document.getElementById('ft_desc').value.trim(),
    clienteId:document.getElementById('ft_cliente').value||null,
    dueño:document.getElementById('ft_dueno').value,
    deadline:document.getElementById('ft_deadline').value||null,
    estado:document.getElementById('ft_estado').value,
    prioridad:document.getElementById('ft_prio').value,
  };
  var dbRow = {
    titulo:data.titulo, descripcion:data.descripcion,
    cliente_id:data.clienteId, dueno:data.dueño,
    deadline:data.deadline, estado:data.estado, prioridad:data.prioridad,
  };
  if(id){
    var t=findTask(id);
    var wasDone=t && t.estado==='hecho';
    if(data.estado==='hecho' && !wasDone) dbRow.completed_at=new Date().toISOString();
    if(data.estado!=='hecho') dbRow.completed_at=null;
    var {error} = await sb.from('tareas').update(dbRow).eq('id', id);
    if(error) return sbError('Error al actualizar tarea', error);
    if(t){
      Object.keys(data).forEach(function(k){t[k]=data[k];});
      if(data.estado==='hecho' && !wasDone) t.completedAt=new Date().toISOString();
      if(data.estado!=='hecho') t.completedAt=null;
    }
  }else{
    var newId='task_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    dbRow.id=newId;
    dbRow.creado_por=S.currentUser;
    dbRow.completed_at = data.estado==='hecho'?new Date().toISOString():null;
    var {error} = await sb.from('tareas').insert(dbRow);
    if(error) return sbError('Error al crear tarea', error);
    var newTask=Object.assign({
      id:newId, createdAt:new Date().toISOString(),
      creadoPor:S.currentUser,
      completedAt:dbRow.completed_at,
    }, data);
    TASKS.push(newTask);
  }
  closeModal();
}

async function deleteTask(id){
  if(!confirm('¿Eliminar esta tarea? No se puede deshacer.'))return;
  var {error} = await sb.from('tareas').delete().eq('id', id);
  if(error) return sbError('Error al eliminar tarea', error);
  TASKS=TASKS.filter(function(t){return t.id!==id;});
  closeModal();
}

async function toggleTaskDone(id){
  var t=findTask(id);if(!t)return;
  var nuevoEstado = t.estado==='hecho' ? 'pendiente' : 'hecho';
  var completedAt = nuevoEstado==='hecho' ? new Date().toISOString() : null;
  var {error} = await sb.from('tareas').update({estado:nuevoEstado, completed_at:completedAt}).eq('id', id);
  if(error) return sbError('Error al actualizar tarea', error);
  t.estado = nuevoEstado;
  t.completedAt = completedAt;
  render();
}

  if(!w.pasos) w.pasos=[];
  var isEdit = idx!==null && idx!==undefined && !isNaN(idx);
  if(isEdit){
    var paso=w.pasos[idx];
    var pasoId = paso && paso._id;
    if(pasoId){
      var {error} = await sb.from('workflow_pasos').update(dbRow).eq('id', pasoId);
      if(error) return sbError('Error al actualizar paso', error);
      data._id = pasoId;
    }
    w.pasos[idx]=data;
  }else{
    dbRow.sort_order = w.pasos.length;
    var {data:inserted, error} = await sb.from('workflow_pasos').insert(dbRow).select().single();
    if(error) return sbError('Error al crear paso', error);
    data._id = inserted.id;
    w.pasos.push(data);
  }
  closeModal();
}

async function deletePaso(idx,wfId){
  if(!confirm('¿Eliminar este paso?'))return;
  var w=WFS.find(function(x){return x.id===wfId;});
  if(!w||!w.pasos) return;
  var paso = w.pasos[idx];
  if(paso && paso._id){
    var {error} = await sb.from('workflow_pasos').delete().eq('id', paso._id);
    if(error) return sbError('Error al eliminar paso', error);
  }
  w.pasos.splice(idx,1);
  closeModal();
}

function modalTemplate(t){
  var isEdit=!!t;
  var d=t||{title:'',icon:'&#9638;',owner:'',color:'#323231'};
  return '<h2>'+(isEdit?'Editar template':'Nuevo template')+'</h2>'
    +'<div class="f-group"><label>Título</label><input id="ft_title" value="'+(d.title||'').replace(/"/g,'&quot;')+'" placeholder="Ej: Onboarding"/></div>'
    +'<div class="f-row"><div class="f-group"><label>Responsable</label><input id="ft_owner" value="'+(d.owner||'')+'" placeholder="Ej: Lucía"/></div>'
    +'<div class="f-group"><label>Color</label><input id="ft_color" type="color" value="'+(d.color||'#323231')+'"/></div></div>'
    +'<div style="display:flex;gap:10px;margin-top:18px">'
    +'<button class="btn btn-dark" onclick="saveTemplate('+(isEdit?'\''+t.id+'\'':'null')+')" style="flex:1;justify-content:center">'+(isEdit?'Guardar':'Crear template')+'</button>'
    +(isEdit?'<button class="btn btn-danger" onclick="deleteTemplate(\''+t.id+'\')">Eliminar</button>':'')
    +'<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>';
}

async function saveTemplate(id){
  var title=document.getElementById('ft_title').value.trim();
  if(!title){alert('Ingresá un título.');return;}
  var data={
    title:title,
    owner:document.getElementById('ft_owner').value.trim(),
    color:document.getElementById('ft_color').value,
    icon:'&#9638;',
  };
  if(id){
    var {error} = await sb.from('templates').update(data).eq('id', id);
    if(error) return sbError('Error al actualizar template', error);
    var t=TPLS.find(function(x){return x.id===id;});
    if(t){Object.keys(data).forEach(function(k){t[k]=data[k];});}
  }else{
    var newId=title.toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||('tpl_'+Date.now());
    while(TPLS.some(function(x){return x.id===newId;})) newId+='_';
    var {error} = await sb.from('templates').insert(Object.assign({id:newId},data));
    if(error) return sbError('Error al crear template', error);
    TPLS.push(Object.assign({id:newId,items:[]},data));
    S.tpl=newId;
  }
  closeModal();
}

async function deleteTemplate(id){
  if(!confirm('¿Eliminar este template? Todos sus ítems se borran y se pierde el progreso de los clientes.'))return;
  var {error} = await sb.from('templates').delete().eq('id', id);
  if(error) return sbError('Error al eliminar template', error);
  TPLS=TPLS.filter(function(t){return t.id!==id;});
  if(S.tpl===id) S.tpl=TPLS[0]?TPLS[0].id:'';
  closeModal();
}

function modalItemTpl(idx,tplId){
  var t=TPLS.find(function(x){return x.id===tplId;});

async function deleteItemTpl(idx,tplId){

function modalMangoIdentidad(){
  var m=MANGO_INFO;

  var personalidadStr=(m.personalidad||[]).map(function(p){return p.titulo+' :: '+p.desc;}).join('\n');
  return '<h2>Editar identidad de Mango</h2>'
    +'<div style="font-size:11px;color:var(--gray-mid);margin-bottom:14px">Para valores y personalidad usá el formato: <code>Título :: Descripción</code> (uno por línea).</div>'
    +'<div class="f-group"><label>Esencia</label><textarea id="fmi_esencia" rows="3">'+(m.esencia||'')+'</textarea></div>'
    +'<div class="f-group"><label>Misión</label><textarea id="fmi_mision" rows="2">'+(m.mision||'')+'</textarea></div>'
    +'<div class="f-group"><label>Visión</label><textarea id="fmi_vision" rows="2">'+(m.vision||'')+'</textarea></div>'
    +'<div class="f-group"><label>Propósito</label><textarea id="fmi_proposito" rows="2">'+(m.proposito||'')+'</textarea></div>'
    +'<div class="f-group"><label>Posicionamiento</label><textarea id="fmi_pos" rows="2">'+(m.posicionamiento||'')+'</textarea></div>'
    +'<div class="f-group"><label>Promesa de marca</label><input id="fmi_promesa" value="'+(m.promesa||'').replace(/"/g,'&quot;')+'"/></div>'
    +'<div class="f-group"><label>Tono de voz</label><textarea id="fmi_tono" rows="2">'+(m.tono||'')+'</textarea></div>'
    +'<div class="f-group"><label>Valores (Título :: Descripción, uno por línea)</label><textarea id="fmi_valores" rows="6">'+valoresStr+'</textarea></div>'
    +'<div class="f-group"><label>Personalidad (Título :: Descripción, uno por línea)</label><textarea id="fmi_pers" rows="5">'+personalidadStr+'</textarea></div>'
    +'<div class="f-group"><label>Cliente ideal</label><textarea id="fmi_cliente" rows="3">'+(m.clienteIdeal||'')+'</textarea></div>'
    +'<div class="f-group"><label>Lo que NO es Mango (uno por línea)</label><textarea id="fmi_noes" rows="5">'+arr2lines(m.noEs)+'</textarea></div>'
    +'<div style="display:flex;gap:10px;margin-top:18px">'
    +'<button class="btn btn-dark" onclick="saveMangoIdentidad()" style="flex:1;justify-content:center">Guardar</button>'
    +'<button class="btn btn-ghost" onclick="closeModal()">Cancelar</button></div>';
}

function parseDoublePoints(s){
  return s.split('\n').map(function(line){
    var parts=line.split('::').map(function(x){return x.trim();});
    if(parts.length<2 || !parts[0]) return null;
    return {titulo:parts[0],desc:parts.slice(1).join('::').trim()};
  }).filter(Boolean);
}

async function saveMangoIdentidad(){
  var nuevo = {
    esencia:document.getElementById('fmi_esencia').value.trim(),
    mision:document.getElementById('fmi_mision').value.trim(),
    vision:document.getElementById('fmi_vision').value.trim(),
    proposito:document.getElementById('fmi_proposito').value.trim(),
    posicionamiento:document.getElementById('fmi_pos').value.trim(),
    promesa:document.getElementById('fmi_promesa').value.trim(),
    tono:document.getElementById('fmi_tono').value.trim(),
    valores:parseDoublePoints(document.getElementById('fmi_valores').value),
    personalidad:parseDoublePoints(document.getElementById('fmi_pers').value),
    clienteIdeal:document.getElementById('fmi_cliente').value.trim(),
    noEs:lines2arr(document.getElementById('fmi_noes').value),
  };
  var dbRow = {
    esencia:nuevo.esencia, mision:nuevo.mision, vision:nuevo.vision,
    proposito:nuevo.proposito, posicionamiento:nuevo.posicionamiento,
    promesa:nuevo.promesa, tono:nuevo.tono,
    valores:nuevo.valores, personalidad:nuevo.personalidad,
    cliente_ideal:nuevo.clienteIdeal, no_es:nuevo.noEs,
  };
  var {error} = await sb.from('mango_info').update(dbRow).eq('id', 1);
  if(error) return sbError('Error al guardar identidad', error);
  Object.keys(nuevo).forEach(function(k){MANGO_INFO[k]=nuevo[k];});
  closeModal();
}

}

// INIT — bootstrap con auth
// ═══════════════════════════════════════════════════════════════════════════
document.getElementById('googleLoginBtn').addEventListener('click', loginWithGoogle);

async function boot(){
  setLoadingMsg('Verificando sesión...');
  var {data:{session}, error} = await sb.auth.getSession();
  if(error || !session){
    showLogin();
    return;
  }
  // Validar dominio
  var email = (session.user && session.user.email) || '';
  if(!email.endsWith('@comunidadmango.com')){
    await sb.auth.signOut();
    showLogin('Tu cuenta (' + email + ') no es del dominio @comunidadmango.com. Solo el equipo de Mango puede entrar.');
    return;
  }
  CURRENT_SESSION = session;
  // Mapeo explícito de mails especiales a miembros del equipo
  var EMAIL_TO_USER = {
    'contacto@comunidadmango.com': 'Camila',
  };
  // Setear usuario actual basado en mail
  var nameFromEmail = email.split('@')[0];
  var explicitMatch = EMAIL_TO_USER[email];
  if(explicitMatch){
    S.currentUser = explicitMatch;
  }else{
    var matchedTeam = (TEAM || []).find(function(t){return t.id===nameFromEmail || t.name.toLowerCase()===nameFromEmail.toLowerCase();});
    if(matchedTeam) S.currentUser = matchedTeam.name;
  }
  // Cargar datos
  setLoadingMsg('Cargando datos...');
  try{
    await bootData();
    // Re-match user después de cargar TEAM real
    if(!explicitMatch){
      var matched = TEAM.find(function(t){return t.id===nameFromEmail || t.name.toLowerCase()===nameFromEmail.toLowerCase();});
      if(matched) S.currentUser = matched.name;
    }
  }catch(e){
    console.error('Error cargando datos:', e);
    showLogin('Error al cargar datos: ' + e.message);
    return;
  }
  // Bind toggle y render
  document.getElementById('sbToggle').addEventListener('click', function(){S.sbOpen=!S.sbOpen; render();});
  showApp();
  render();
}

// Listener para cambios de auth (logout en otra pestaña, etc.)
sb.auth.onAuthStateChange(function(event, session){
  if(event==='SIGNED_OUT'){
    CURRENT_SESSION = null;
    showLogin();
  }
});

boot();
</script>
