name: Meta KPIs daily sync

on:
  schedule:
    # Todos los días a las 9:00 UTC = 6:00 Argentina (UTC-3)
    - cron: '0 9 * * *'
  workflow_dispatch:  # permite correr a mano desde la UI de GitHub Actions

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync Meta KPIs
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scripts/meta_kpis.py
